<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/layout :: navbar"></div>

<section class="page-header">
    <div>
        <p class="eyebrow">Admin Panel</p>
        <h1>Create Product</h1>
        <p class="page-subtitle">Add a new product to the TCG catalog with game, category, stock and status.</p>
    </div>
</section>

<div class="form-shell">
    <div class="form-container product-form-card">
        <form th:action="@{/products}" th:object="${product}" method="post">

            <div class="form-grid">
                <div class="form-group form-group-full">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Enter product name">
                    <div class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label for="cardGame">Card Game</label>
                    <select id="cardGame" th:field="*{cardGame}">
                        <option value="">Select a game</option>
                        <option th:each="game : ${cardGames}"
                                th:value="${game}"
                                th:text="${game}">
                        </option>
                    </select>
                    <div class="error-message" th:if="${#fields.hasErrors('cardGame')}" th:errors="*{cardGame}"></div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" th:field="*{category}">
                        <option value="">Select a category</option>
                        <option th:each="category : ${categories}"
                                th:value="${category}"
                                th:text="${category}">
                        </option>
                    </select>
                    <div class="error-message" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>

                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" id="price" th:field="*{price}" step="0.01" min="0" placeholder="0.00">
                    <div class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" th:field="*{stock}" min="0" placeholder="0">
                    <div class="error-message" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                </div>

                <div class="form-group form-group-full">
                    <label for="status">Status</label>
                    <select id="status" th:field="*{status}">
                        <option value="">Select a status</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}">
                        </option>
                    </select>
                    <div class="error-message" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/products}" class="btn btn-secondary">Back to Catalog</a>
                <button type="submit">Save Product</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
