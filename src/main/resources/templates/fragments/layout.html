<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Layout Fragments</title>
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <div class="nav-container">
        <a th:href="@{/}" class="nav-brand">TCG Store</a>

        <div class="nav-links">
            <a th:href="@{/products}">Shop</a>
            <a th:href="@{/cart}" class="cart-link">
                🛒 Cart (<span th:text="${cartItemCount}">0</span>)
            </a>

            <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Dashboard</a>
            <a th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
            <a th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>

            <a th:href="@{/orders}" sec:authorize="hasRole('ADMIN')">Admin Orders</a>
            <a th:href="@{/customers}" sec:authorize="hasRole('ADMIN')">Admin Customers</a>
            <a th:href="@{/products/new}" sec:authorize="hasRole('ADMIN')">Add Product</a>

            <span sec:authorize="isAuthenticated()">
                Welcome, <span sec:authentication="name"></span>
            </span>

            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline;">
                <button type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
