<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - TCG Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<section class="auth-page">
    <div class="auth-hero">
        <p class="eyebrow">Welcome Back</p>
        <h1>Sign in to your TCG Store</h1>
        <p class="page-subtitle">
            Access products, orders, customers and your store management tools.
        </p>
    </div>

    <div class="auth-card">
        <h2>Login</h2>

        <div th:if="${param.error}" class="error-message">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="success-message">
            You have logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="auth-button">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don’t have an account?</p>
            <a th:href="@{/register}" class="btn btn-secondary">Create Account</a>
        </div>
    </div>
</section>

</body>
</html>
